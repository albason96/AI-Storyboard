<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0d0d0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Storyboard"/>
<meta name="description" content="Generador de storyboard cinematográfico con IA"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="icon" type="image/png" href="icons/icon-192.png"/>
<title>DP Storyboard AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0d;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #555;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.18);
    --amber: #EF9F27;
    --amber-bg: #1a1000;
    --amber-border: rgba(239,159,39,0.3);
    --red: #e05050;
    --green: #1D9E75;
    --blue: #378ADD;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 0) 16px env(safe-area-inset-bottom, 16px);
    padding-top: max(env(safe-area-inset-top), 16px);
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 0 16px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 20px;
  }

  .logo {
    width: 44px; height: 44px;
    background: #1a1a1a;
    border: 0.5px solid var(--border2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  .header-sub {
    font-size: 10px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* INSTALL BANNER */
  .install-banner {
    display: none;
    background: #0a1a0a;
    border: 0.5px solid rgba(29,158,117,0.4);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 16px;
    align-items: center;
    gap: 10px;
  }

  .install-banner.show { display: flex; }

  .install-banner-text { flex: 1; font-size: 13px; color: #7ecfb3; line-height: 1.4; }
  .install-banner-text strong { color: #1D9E75; }

  .install-btn {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    white-space: nowrap;
    text-transform: uppercase;
  }

  /* API SECTION */
  .api-section {
    background: var(--amber-bg);
    border: 0.5px solid var(--amber-border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .api-row { display: flex; gap: 8px; }

  input[type="password"], input[type="text"], textarea, select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input[type="password"]::placeholder,
  textarea::placeholder { color: var(--text3); }

  input:focus, textarea:focus, select:focus {
    border-color: rgba(255,255,255,0.35);
  }

  .api-hint {
    font-size: 11px;
    color: #7a6030;
    margin-top: 8px;
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.5;
  }

  .api-hint a { color: var(--amber); text-decoration: none; }

  /* INPUT SECTION */
  .input-section {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 16px;
  }

  textarea#script-input {
    min-height: 160px;
    resize: vertical;
    line-height: 1.6;
    font-size: 13px;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  select {
    flex: 1;
    min-width: 160px;
    cursor: pointer;
    color: var(--text2);
  }

  select option { background: #1e1e1e; color: var(--text); }

  .analyze-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 20px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 500;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    -webkit-appearance: none;
  }

  .analyze-btn:active { transform: scale(0.97); }
  .analyze-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ERROR */
  .error-box {
    display: none;
    background: #1a0404;
    border: 0.5px solid rgba(224,80,80,0.4);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: #e08080;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 12px;
    line-height: 1.6;
  }

  /* LOADING */
  .loading {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }

  .loading-clapperboard {
    width: 60px; height: 60px;
    margin: 0 auto 16px;
    position: relative;
  }

  .clap-top {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 40%;
    background: #1e1e1e;
    border-radius: 4px 4px 0 0;
    overflow: hidden;
    transform-origin: left center;
    animation: clap 1s ease-in-out infinite;
  }

  .clap-top::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, #f0f0f0 0, #f0f0f0 8px, #1e1e1e 8px, #1e1e1e 16px);
  }

  .clap-body {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 65%;
    background: #1e1e1e;
    border-radius: 4px;
    border: 0.5px solid var(--border2);
  }

  @keyframes clap {
    0%, 100% { transform: rotate(0deg); }
    40% { transform: rotate(-25deg); }
    50% { transform: rotate(-25deg); }
    70% { transform: rotate(0deg); }
  }

  .loading-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* STORYBOARD */
  .storyboard { display: none; }

  .sb-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 0.5px solid var(--border);
    gap: 10px;
  }

  .sb-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1.1;
  }

  .sb-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    text-align: right;
    white-space: nowrap;
  }

  .dp-notes {
    background: #111;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 16px;
    font-size: 13px;
    line-height: 1.7;
    color: #bbb;
  }

  .dp-notes-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* SHOT CARDS */
  .shots-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }

  .shot-card {
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg2);
  }

  .shot-frame {
    width: 100%;
    aspect-ratio: 16/9;
    background: #050505;
    position: relative;
    overflow: hidden;
  }

  .shot-frame svg { width: 100%; height: 100%; display: block; }

  .shot-overlay-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 8px 10px;
    gap: 8px;
  }

  .shot-number {
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 3px;
    backdrop-filter: blur(4px);
  }

  .shot-type-badge {
    background: rgba(255,255,255,0.1);
    color: #ccc;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    border: 0.5px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    max-width: 55%;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .shot-info { padding: 13px 14px; }

  .shot-scene-name {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .shot-desc {
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 8px;
  }

  .shot-narr {
    font-size: 12px;
    color: var(--text2);
    font-style: italic;
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .shot-tech {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tech-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 4px 9px;
    border-radius: 4px;
    border: 0.5px solid var(--border);
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tech-tag.lens { color: #5baee8; border-color: rgba(55,138,221,0.3); background: rgba(55,138,221,0.08); }
  .tech-tag.move { color: #5ecfaa; border-color: rgba(29,158,117,0.3); background: rgba(29,158,117,0.08); }
  .tech-tag.light { color: #d4a04a; border-color: rgba(239,159,39,0.3); background: rgba(239,159,39,0.08); }

  /* NEW ANALYSIS BUTTON */
  .new-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    margin-bottom: 24px;
    transition: background 0.2s;
  }

  .new-btn:active { background: var(--bg3); }
</style>
</head>
<body>
<div class="app">

  <div class="install-banner" id="install-banner">
    <div class="install-banner-text">
      <strong>Instalar como app</strong><br/>
      Añade esta app a tu pantalla de inicio para usarla sin navegador.
    </div>
    <button class="install-btn" id="install-btn" onclick="installPWA()">Instalar</button>
  </div>

  <div class="header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="10" width="24" height="16" rx="2.5" fill="#2a2a2a" stroke="#555" stroke-width="0.8"/>
        <line x1="2" y1="15" x2="26" y2="15" stroke="#444" stroke-width="0.7"/>
        <line x1="2" y1="20" x2="26" y2="20" stroke="#444" stroke-width="0.7"/>
        <rect x="2" y="5.5" width="24" height="5.5" rx="1.5" fill="#1e1e1e" stroke="#555" stroke-width="0.8"/>
        <rect x="3" y="5.5" width="3.5" height="5.5" fill="#f0f0f0" opacity="0.9"/>
        <rect x="7" y="5.5" width="3.5" height="5.5" fill="#1a1a1a"/>
        <rect x="11" y="5.5" width="3.5" height="5.5" fill="#f0f0f0" opacity="0.9"/>
        <rect x="15" y="5.5" width="3.5" height="5.5" fill="#1a1a1a"/>
        <rect x="19" y="5.5" width="3.5" height="5.5" fill="#f0f0f0" opacity="0.9"/>
        <rect x="23" y="5.5" width="3" height="5.5" fill="#1a1a1a"/>
        <circle cx="22" cy="13" r="2" fill="#c03030"/>
        <rect x="4" y="1.5" width="8" height="4" rx="1" fill="#1a1a1a" stroke="#444" stroke-width="0.6"/>
        <line x1="5" y1="1.5" x2="5" y2="5.5" stroke="#555" stroke-width="0.6"/>
        <line x1="7" y1="1.5" x2="7" y2="5.5" stroke="#555" stroke-width="0.6"/>
        <line x1="9" y1="1.5" x2="9" y2="5.5" stroke="#555" stroke-width="0.6"/>
        <line x1="11" y1="1.5" x2="11" y2="5.5" stroke="#555" stroke-width="0.6"/>
      </svg>
    </div>
    <div>
      <div class="header-title">DP Storyboard AI</div>
      <div class="header-sub">Director of Photography System</div>
    </div>
  </div>

  <div class="api-section">
    <div class="section-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      API Key de Anthropic
    </div>
    <div class="api-row">
      <input type="password" id="api-key" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
    </div>
    <div class="api-hint">
      Obtén tu clave en <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys. No se guarda en ningún sitio.
    </div>
  </div>

  <div class="input-section">
    <div class="section-label" style="color:var(--text2); margin-bottom:10px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Guion o sinopsis
    </div>
    <textarea id="script-input" placeholder="Escribe aquí tu guion, escena o sinopsis...&#10;&#10;Ej: EXT. ANDÉN ABANDONADO - MADRUGADA&#10;Niebla espesa. Elena camina sola con una maleta..."></textarea>
    <div class="controls">
      <select id="style-select">
        <option value="cinematico">Cinematográfico Clásico</option>
        <option value="thriller">Thriller / Suspense</option>
        <option value="documental">Documental / Realismo</option>
        <option value="noir">Noir / Neo-Noir</option>
        <option value="accion">Acción / Dinámico</option>
        <option value="drama">Drama Íntimo</option>
      </select>
      <button class="analyze-btn" id="analyze-btn" onclick="analyzeScript()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Generar storyboard

    <div class="loading-clapperboard">
      <div class="clap-top"></div>

  <div class="storyboard" id="storyboard"></div>

</div>

<script>
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.remove('show');
  deferredPrompt = null;
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.warn);
}

async function analyzeScript() {
  const apiKey = document.getElementById('api-key').value.trim();
  const script = document.getElementById('script-input').value.trim();
  const style = document.getElementById('style-select').value;
  const btn = document.getElementById('analyze-btn');
  const loading = document.getElementById('loading');
  const storyboard = document.getElementById('storyboard');
  const errorBox = document.getElementById('error-box');

  errorBox.style.display = 'none';

  if (!apiKey) { showError('Introduce tu API key de Anthropic antes de continuar.'); return; }
  if (!apiKey.startsWith('sk-ant-')) { showError('La API key no parece válida. Debe empezar por sk-ant-...'); return; }
  if (!script) { showError('Introduce un guion o sinopsis antes de continuar.'); return; }

  btn.disabled = true;
  loading.style.display = 'block';
  storyboard.style.display = 'none';
  storyboard.innerHTML = '';

  const prompt = `Eres un Director de Fotografía (DP) senior con más de 30 años de experiencia en cine internacional. Has trabajado con directores como Nolan, Villeneuve y Cuarón. Tu tarea es analizar el siguiente guion y crear un storyboard detallado.

GUION:
"""
${script}
"""

ESTILO VISUAL: ${style}

Devuelve ÚNICAMENTE un JSON válido sin markdown ni backticks:

{
  "titulo": "título corto",
  "genero": "género detectado",
  "tono": "tono emocional breve",
  "dp_notes": "Notas del DP: concepto visual, paleta de color, referencias cinematográficas, iluminación maestra (3-4 frases técnicas densas)",
  "shots": [
    {
      "numero": 1,
      "escena": "EXT/INT + lugar corto",
      "tipo_plano": "tipo de plano",
      "descripcion": "descripción visual del frame (2-3 frases)",
      "objetivo_narrativo": "función narrativa del plano",
      "lente": "focal y tipo de lente",
      "movimiento": "movimiento de cámara específico",
      "iluminacion": "descripción técnica de iluminación",
      "color_dominante": "paleta en 2-3 palabras"
    }
  ]
}

Genera entre 5 y 8 planos con lógica cinematográfica profesional.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || `HTTP ${response.status}`);

    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderStoryboard(parsed);

  } catch (err) {
    showError(err.message || 'No se pudo conectar. Revisa tu API key e inténtalo de nuevo.');
    loading.style.display = 'none';
    btn.disabled = false;
  }
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}

function generateShotSVG(shot) {
  const type = (shot.tipo_plano || '').toLowerCase();
  const color = (shot.color_dominante || '').toLowerCase();

  let bg = '#080808', accent = '#2a2a2a', sky = '#0f0f1a', ground = '#050505';

  if (color.includes('cálido') || color.includes('dorado') || color.includes('naranja') || color.includes('amber')) {
    bg = '#0d0800'; accent = '#3d2200'; sky = '#150e00'; ground = '#080500';
  } else if (color.includes('azul') || color.includes('frío') || color.includes('blue') || color.includes('cyan')) {
    bg = '#00050f'; accent = '#001230'; sky = '#000810'; ground = '#000308';
  } else if (color.includes('verde') || color.includes('green')) {
    bg = '#000d04'; accent = '#002210'; sky = '#001008'; ground = '#000803';
  } else if (color.includes('rojo') || color.includes('red') || color.includes('sangre') || color.includes('crimson')) {
    bg = '#0f0000'; accent = '#2e0000'; sky = '#100000'; ground = '#080000';
  } else if (color.includes('gris') || color.includes('niebla') || color.includes('blanco')) {
    bg = '#0a0a0a'; accent = '#222'; sky = '#111'; ground = '#060606';
  } else if (color.includes('morado') || color.includes('violeta') || color.includes('purple')) {
    bg = '#080010'; accent = '#1a0040'; sky = '#0a0018'; ground = '#040008';
  }

  const isClose = type.includes('primer') || type.includes('detalle') || type.includes('close') || type.includes('rostro') || type.includes('busto');
  const isWide = type.includes('general') || type.includes('panorám') || type.includes('maestro') || type.includes('conjunto') || type.includes('wide') || type.includes('establishing');

  let scene = '';

  if (isWide) {
    scene = `
      <rect width="320" height="180" fill="${bg}"/>
      <rect y="95" width="320" height="85" fill="${ground}"/>
      <rect y="55" width="320" height="55" fill="${sky}" opacity="0.7"/>
      <polygon points="30,95 65,50 100,95" fill="${accent}" opacity="0.75"/>
      <polygon points="85,95 130,28 175,95" fill="${accent}" opacity="0.85"/>
      <polygon points="170,95 210,55 250,95" fill="${accent}" opacity="0.65"/>
      <polygon points="240,95 268,62 296,95" fill="${accent}" opacity="0.55"/>
      <rect x="148" y="82" width="5" height="13" fill="#e8b060" opacity="0.5"/>
      <ellipse cx="155" cy="95" rx="5" ry="7" fill="#777" opacity="0.5"/>
      <ellipse cx="155" cy="92" rx="3" ry="4" fill="#999" opacity="0.4"/>
    `;
  } else if (isClose) {
    scene = `
      <rect width="320" height="180" fill="${bg}"/>
      <ellipse cx="160" cy="108" rx="58" ry="70" fill="#221c14" opacity="0.9"/>
      <ellipse cx="160" cy="76" rx="35" ry="42" fill="#2e2618"/>
      <ellipse cx="160" cy="70" rx="30" ry="34" fill="#261e14"/>
      <rect x="128" y="92" width="64" height="24" rx="3" fill="#1e1810" opacity="0.85"/>
      <ellipse cx="145" cy="72" rx="9" ry="10" fill="#140e08"/>
      <ellipse cx="175" cy="72" rx="9" ry="10" fill="#140e08"/>
      <ellipse cx="145" cy="71" rx="4.5" ry="5.5" fill="#080604"/>
      <ellipse cx="175" cy="71" rx="4.5" ry="5.5" fill="#080604"/>
      <circle cx="147" cy="69" r="2" fill="rgba(255,255,255,0.45)"/>
      <circle cx="177" cy="69" r="2" fill="rgba(255,255,255,0.45)"/>
      <path d="M 145 90 Q 160 96 175 90" stroke="#100c08" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <rect width="45" height="180" fill="${bg}" opacity="0.65"/>
      <rect x="275" width="45" height="180" fill="${bg}" opacity="0.65"/>
    `;
  } else {
    scene = `
      <rect width="320" height="180" fill="${bg}"/>
      <rect y="105" width="320" height="75" fill="${ground}" opacity="0.85"/>
      <rect y="58" width="320" height="58" fill="${sky}" opacity="0.55"/>
      <rect x="28" y="42" width="65" height="90" fill="${accent}" opacity="0.65" rx="2"/>
      <rect x="33" y="48" width="14" height="11" fill="#e8b060" opacity="0.35"/>
      <rect x="52" y="48" width="14" height="11" fill="#111" opacity="0.5"/>
      <rect x="33" y="64" width="14" height="11" fill="#e8b060" opacity="0.55"/>
      <rect x="52" y="64" width="14" height="11" fill="#e8b060" opacity="0.25"/>
      <rect x="33" y="80" width="14" height="11" fill="#111" opacity="0.4"/>
      <rect x="28" y="118" width="65" height="14" fill="${accent}" opacity="0.45" rx="1"/>
      <ellipse cx="205" cy="107" rx="12" ry="34" fill="#444" opacity="0.5"/>
      <ellipse cx="205" cy="95" rx="8" ry="22" fill="#555" opacity="0.65"/>
      <rect x="202" y="104" width="4" height="5" fill="#777" opacity="0.8"/>
      <ellipse cx="158" cy="107" rx="8" ry="22" fill="#444" opacity="0.55"/>
      <rect x="155" y="104" width="4" height="5" fill="#666" opacity="0.7"/>
    `;
  }

  const grid = `
    <line x1="107" y1="0" x2="107" y2="180" stroke="${accent}" stroke-width="0.4" opacity="0.25"/>
    <line x1="213" y1="0" x2="213" y2="180" stroke="${accent}" stroke-width="0.4" opacity="0.25"/>
    <line x1="0" y1="60" x2="320" y2="60" stroke="${accent}" stroke-width="0.4" opacity="0.25"/>
    <line x1="0" y1="120" x2="320" y2="120" stroke="${accent}" stroke-width="0.4" opacity="0.25"/>
    <rect width="320" height="180" fill="none" stroke="${accent}" stroke-width="0.5" opacity="0.5"/>
  `;

  return `<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">${scene}${grid}</svg>`;
}

function renderStoryboard(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('analyze-btn').disabled = false;

  let shotsHTML = '';
  (data.shots || []).forEach(shot => {
    const ilum = (shot.iluminacion || '');
    const ilumShort = ilum.length > 60 ? ilum.substring(0, 60) + '…' : ilum;
    shotsHTML += `
      <div class="shot-card">
        <div class="shot-frame">
          ${generateShotSVG(shot)}
          <div class="shot-overlay-top">
            <span class="shot-number">PLANO ${shot.numero}</span>
            <span class="shot-type-badge">${shot.tipo_plano || ''}</span>
          </div>
        </div>
        <div class="shot-info">
          <div class="shot-scene-name">${shot.escena || ''}</div>
          <div class="shot-desc">${shot.descripcion || ''}</div>
          <div class="shot-narr">${shot.objetivo_narrativo || ''}</div>
          <div class="shot-tech">
            <span class="tech-tag lens">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
              ${shot.lente || ''}
            </span>
            <span class="tech-tag move">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
              ${shot.movimiento || ''}
            </span>
            <span class="tech-tag light">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              ${ilumShort}
            </span>
          </div>
        </div>
      </div>`;
  });

  const sb = document.getElementById('storyboard');
  sb.innerHTML = `
    <div class="sb-header">
      <div>
        <div class="sb-title">${(data.titulo || 'STORYBOARD').toUpperCase()}</div>
      </div>
      <div class="sb-meta">${data.genero || ''}<br/>${data.tono || ''}<br/>${(data.shots||[]).length} PLANOS</div>
    </div>
    <div class="dp-notes">
      <div class="dp-notes-label">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6s4-4 11-4 11 4 11 4-4 4-11 4-11-4-11-4z"/><path d="M1 18s4-4 11-4 11 4 11 4-4 4-11 4-11-4-11-4z"/></svg>
        Notas del Director de Fotografía
      </div>
      ${data.dp_notes || ''}
    </div>
    <div class="shots-list">${shotsHTML}</div>
    <button class="new-btn" onclick="newAnalysis()">↑ Nuevo análisis</button>
  `;

  sb.style.display = 'block';
  sb.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function newAnalysis() {
  document.getElementById('storyboard').style.display = 'none';
  document.getElementById('script-input').scrollIntoView({ behavior: 'smooth', block: 'center' });
  document.getElementById('script-input').focus();
}
</script>
</body>
</html>
